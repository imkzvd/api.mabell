name: Build and push docker image

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/api.mabell:${{ env.VERSION }} .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/api.mabell:${{ env.VERSION }}

      - name: Tag latest
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/api.mabell:${{ env.VERSION }} ${{ secrets.DOCKER_USERNAME }}/api.mabell:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/api.mabell:latest
