name: Build and admin docker image to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build docker image
        run: |
          docker build -t ghcr.io/api.admin.mabell:${{ env.VERSION }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/api.admin.mabell:${{ env.VERSION }}

      - name: Tag image as latest
        run: |
          docker tag ghcr.io/api.admin.mabell:${{ env.VERSION }} ghcr.io/api.admin.mabell:latest
          docker push ghcr.io/api.admin.mabell:latest
