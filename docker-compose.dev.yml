services:
  mongodb:
    image: mongo:latest
    container_name: mongodb-dev
    ports:
      - "${DB_PORT:-27017}:27017"
#    environment:
#      - MONGO_INITDB_ROOT_USERNAME=devrootusername
#      - MONGO_INITDB_ROOT_PASSWORD=devrootpass
    volumes:
      - mongo-data:/data/db:rw
    restart: on-failure

  redis:
    image: redis:latest
    container_name: cache-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - cache-data:/data:rw
    restart: on-failure

  typesense:
    image: typesense/typesense:28.0
    container_name: search-dev
    ports:
      - "${TYPESENSE_PORT:-8108}:8108"
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=${TYPESENSE_KEY}
    volumes:
      - search-data:/data:rw
    command: '--enable-cors'
    restart: on-failure

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local
  typesense-data:
    driver: local